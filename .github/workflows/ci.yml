name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # ── Job 1: Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

  # ── Job 3: SEO and Schema Validation ──────────────────────────────────────
  # Rebuilds independently — avoids cross-runner artifact transfer failures.
  seo-schema:
    name: SEO and Schema Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Build for validation
        run: npm run build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000
          NODE_ENV: production

      - name: Wait for server
        run: |
          echo "Waiting for server on port 3000..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is up after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Server did not start within 120 seconds"
          exit 1

      - name: Validate SEO
        run: BASE_URL=http://localhost:3000 node scripts/test-seo.js
        continue-on-error: true

      - name: Validate Schema
        run: |
          if [ -f scripts/test-schema.js ]; then
            BASE_URL=http://localhost:3000 node scripts/test-schema.js
          else
            echo "test-schema.js not found, skipping"
          fi
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-schema-reports
          path: |
            seo-report.json
            schema-report.json
          if-no-files-found: warn
          retention-days: 14

  # ── Job 4: Lighthouse against live production site ────────────────────────
  lighthouse:
    name: Lighthouse Audit (Production)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Run Lighthouse against production
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const manifest = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));
              const lines = manifest.map(r =>
                `| ${r.url} | ${Math.round(r.summary.performance * 100)} | ${Math.round(r.summary.accessibility * 100)} | ${Math.round(r.summary.seo * 100)} |`
              ).join('\n');
              const body = `## Lighthouse Results\n\n| URL | Perf | A11y | SEO |\n|---|---|---|---|\n${lines}`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } catch(e) {
              console.log('Could not parse Lighthouse results:', e.message);
            }

  # ── Job 5: Security Audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
