name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # ── Job 1: Lint ───────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 3

  # ── Job 3: SEO & Schema Validation (against local build) ──────────────────
  seo-schema:
    name: 🔎 SEO + Schema Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      # Start the Next.js production server in background
      - name: Start server
        run: npm run start &

      # Wait up to 30s for port 3000 to be ready
      - name: Wait for server
        run: npx wait-on@latest http://localhost:3000 --timeout 30000

      - name: Validate SEO
        run: BASE_URL=http://localhost:3000 node scripts/test-seo.js
        continue-on-error: true

      - name: Validate Schema
        run: BASE_URL=http://localhost:3000 node scripts/test-schema.js
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-schema-reports
          path: |
            seo-report.json
            schema-report.json
          retention-days: 14

  # ── Job 4: Lighthouse (against LIVE production site, post-deploy) ─────────
  # Only runs after a successful push to master so the live URL is up to date.
  lighthouse:
    name: 💡 Lighthouse Audit (Production)
    runs-on: ubuntu-latest
    # Only run on master push, not PRs — we want to test the live site
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Run Lighthouse against production
        uses: treosh/lighthouse-ci-action@v11
        with:
          # Tests the LIVE site — no local server needed
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const manifest = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));
              const lines = manifest.map(r =>
                `| ${r.url} | ${Math.round(r.summary.performance * 100)} | ${Math.round(r.summary.accessibility * 100)} | ${Math.round(r.summary.seo * 100)} |`
              ).join('\n');
              const body = `## 💡 Lighthouse Results\n\n| URL | Perf | A11y | SEO |\n|---|---|---|---|\n${lines}`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } catch(e) {
              console.log('Could not parse Lighthouse results:', e.message);
            }

  # ── Job 5: Security Audit ────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
